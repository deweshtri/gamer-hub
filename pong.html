<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Gamer Hub - Pong</title>
<link rel="stylesheet" href="style.css" />
<style>
  html, body { background: #0d1b2a; }
  body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; overflow: hidden; }
  .topbar h1, .topbar .back-link { color: #fff; }
  .topbar .back-link { background: rgba(255,255,255,0.15); }
  .topbar .back-link:hover { background: rgba(255,255,255,0.3); }
  .stats { display: flex; gap: 3em; font-size: clamp(1.4rem, 6vw, 2.4rem); font-weight: bold; color: #fff; margin: 0.2em 0; }
  .game-wrap { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 0.5em; }
  canvas { background: #16263d; border-radius: 12px; touch-action: none; max-width: 100%; max-height: 100%; }
  .credit { color: #ffe9a8; }
  .overlay { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(13,27,42,0.7); color: #fff; text-align: center; padding: 1em; }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 4rem); margin: 0; color: var(--accent); text-shadow: 0 4px 0 rgba(0,0,0,0.25); }
  .overlay p { font-size: clamp(0.9rem, 2.5vw, 1.2rem); margin: 0.4em 0; }
  .mode-pick { display: flex; gap: 1em; flex-wrap: wrap; justify-content: center; margin-top: 0.8em; }
  .mode-card { background: rgba(255,255,255,0.12); border: 3px solid transparent; border-radius: 16px; padding: 1em 1.4em; cursor: pointer; color: #fff; min-width: 130px; text-align: center; }
  .mode-card:hover { border-color: var(--accent); }
  .mode-card .ico { font-size: 2rem; margin-bottom: 0.3em; }
  #p1-label { color: #ffd166; font-size: 0.7em; display: block; }
  #p2-label { color: #06d6a0; font-size: 0.7em; display: block; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="index.html">← Hub</a>
    <h1>PONG</h1>
    <span class="spacer"></span>
  </div>
  <div class="stats">
    <span><span id="p1-label"></span><span id="player-score">0</span></span>
    <span style="color:#fff">:</span>
    <span><span id="p2-label"></span><span id="ai-score">0</span></span>
  </div>
  <div class="game-wrap"><canvas id="game"></canvas></div>
  <div class="credit">Made by Atharv Tripathi</div>

  <!-- Mode select -->
  <div class="overlay" id="mode-screen">
    <h1>PONG</h1>
    <p>Choose your mode</p>
    <div class="mode-pick">
      <div class="mode-card" id="mode-bot">
        <div class="ico">🤖</div>vs Bot<br/><small>Mouse / W·S to move</small>
      </div>
      <div class="mode-card" id="mode-2p">
        <div class="ico">👥</div>2 Players<br/><small>P1: W·S &nbsp; P2: ↑·↓</small>
      </div>
    </div>
  </div>

  <!-- Game over -->
  <div class="overlay hidden" id="gameover-screen">
    <h1 id="result-title">GAME OVER</h1>
    <p id="result-text"></p>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>

<script>
(() => {
  const canvas        = document.getElementById('game');
  const ctx           = canvas.getContext('2d');
  const modeScreen    = document.getElementById('mode-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const restartBtn    = document.getElementById('restart-btn');
  const resultTitle   = document.getElementById('result-title');
  const resultText    = document.getElementById('result-text');
  const playerScoreEl = document.getElementById('player-score');
  const aiScoreEl     = document.getElementById('ai-score');
  const p1Label       = document.getElementById('p1-label');
  const p2Label       = document.getElementById('p2-label');

  const WIN_SCORE = 5;
  let W, H, paddleW, paddleH;
  let player, ai, ball, pScore, aScore, running, lastTime, mode = 'bot';

  function resize() {
    const wrap = canvas.parentElement;
    W = Math.min(wrap.clientWidth - 10, 700);
    H = Math.min(wrap.clientHeight - 10, W * 0.6);
    canvas.width = W; canvas.height = H;
    paddleW = W * 0.018; paddleH = H * 0.2;
    if (player) { player.x = paddleW * 2; ai.x = W - paddleW * 3; }
  }
  window.addEventListener('resize', resize);

  document.getElementById('mode-bot').addEventListener('click', () => {
    mode = 'bot';
    p1Label.textContent = 'YOU'; p2Label.textContent = 'BOT';
    modeScreen.classList.add('hidden');
    startGame();
  });
  document.getElementById('mode-2p').addEventListener('click', () => {
    mode = '2p';
    p1Label.textContent = 'P1'; p2Label.textContent = 'P2';
    modeScreen.classList.add('hidden');
    startGame();
  });
  restartBtn.addEventListener('click', () => { gameoverScreen.classList.add('hidden'); modeScreen.classList.remove('hidden'); });

  function init() {
    resize();
    player = { x: paddleW * 2, y: H / 2 - paddleH / 2, w: paddleW, h: paddleH };
    ai     = { x: W - paddleW * 3, y: H / 2 - paddleH / 2, w: paddleW, h: paddleH };
    resetBall(1);
    pScore = 0; aScore = 0;
    playerScoreEl.textContent = pScore;
    aiScoreEl.textContent = aScore;
  }

  function startGame() { init(); running = true; lastTime = performance.now(); requestAnimationFrame(loop); }

  function resetBall(dir) {
    ball = { x: W / 2, y: H / 2, r: H * 0.018, vx: dir * W * 0.4, vy: (Math.random() * 2 - 1) * H * 0.3 };
  }

  // Touch: left half = P1, right half = P2/AI
  canvas.addEventListener('pointermove', e => {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const x = e.clientX - rect.left;
    if (x < W / 2) {
      player.y = Math.min(Math.max(y - player.h / 2, 0), H - player.h);
    } else if (mode === '2p') {
      ai.y = Math.min(Math.max(y - ai.h / 2, 0), H - ai.h);
    }
  });

  const keys = {};
  window.addEventListener('keydown', e => {
    if (['w','W','s','S','ArrowUp','ArrowDown'].includes(e.key)) { keys[e.key] = true; e.preventDefault(); }
  });
  window.addEventListener('keyup', e => { keys[e.key] = false; });

  function update(dt) {
    const spd = H * 1.1;
    if (keys['w'] || keys['W']) player.y -= spd * dt;
    if (keys['s'] || keys['S']) player.y += spd * dt;
    player.y = Math.min(Math.max(player.y, 0), H - player.h);

    if (mode === '2p') {
      if (keys['ArrowUp'])   ai.y -= spd * dt;
      if (keys['ArrowDown']) ai.y += spd * dt;
      ai.y = Math.min(Math.max(ai.y, 0), H - ai.h);
    } else {
      // AI bot follows ball
      const center = ai.y + ai.h / 2;
      const spd2 = H * 0.85;
      if (center < ball.y - 10) ai.y += spd2 * dt;
      else if (center > ball.y + 10) ai.y -= spd2 * dt;
      ai.y = Math.min(Math.max(ai.y, 0), H - ai.h);
    }

    ball.x += ball.vx * dt; ball.y += ball.vy * dt;
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy *= -1; }
    if (ball.y + ball.r > H) { ball.y = H - ball.r; ball.vy *= -1; }

    // player paddle hit
    if (ball.vx < 0 && ball.x - ball.r < player.x + player.w && ball.x - ball.r > player.x && ball.y > player.y && ball.y < player.y + player.h) {
      ball.x = player.x + player.w + ball.r; ball.vx *= -1.07;
      ball.vy += ((ball.y - (player.y + player.h / 2)) / (player.h / 2)) * H * 0.25;
    }
    // ai paddle hit
    if (ball.vx > 0 && ball.x + ball.r > ai.x && ball.x + ball.r < ai.x + ai.w && ball.y > ai.y && ball.y < ai.y + ai.h) {
      ball.x = ai.x - ball.r; ball.vx *= -1.07;
      ball.vy += ((ball.y - (ai.y + ai.h / 2)) / (ai.h / 2)) * H * 0.25;
    }

    if (ball.x < -ball.r) { aScore++; aiScoreEl.textContent = aScore; checkWin(); if (running) resetBall(1); }
    else if (ball.x > W + ball.r) { pScore++; playerScoreEl.textContent = pScore; checkWin(); if (running) resetBall(-1); }
  }

  function checkWin() {
    if (pScore >= WIN_SCORE || aScore >= WIN_SCORE) {
      running = false;
      const won = pScore >= WIN_SCORE;
      resultTitle.textContent = mode === '2p' ? (won ? 'P1 WINS! 🏓' : 'P2 WINS! 🏓') : (won ? 'YOU WIN! 🏓' : 'BOT WINS');
      resultText.textContent = 'Score: ' + pScore + ' — ' + aScore;
      gameoverScreen.classList.remove('hidden');
    }
  }

  function draw() {
    ctx.fillStyle = '#16263d'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 2; ctx.setLineDash([8, 10]);
    ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = '#ffd166'; ctx.fillRect(player.x, player.y, player.w, player.h);
    ctx.fillStyle = '#06d6a0'; ctx.fillRect(ai.x, ai.y, ai.w, ai.h);
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
  }

  function loop(now) {
    if (!running) return;
    const dt = Math.min((now - lastTime) / 1000, 0.033);
    lastTime = now; update(dt); draw();
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
