<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Gamer Hub - Memory Match</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; }
  .stats { display: flex; gap: 2em; font-size: clamp(1rem, 4vw, 1.5rem); font-weight: bold; margin: 0.4em 0 0.8em; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: min(92vw, 420px);
    margin: 0 auto;
  }
  .card {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: min(9vw, 2.6rem);
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    user-select: none;
  }
  .card.flipped, .card.matched {
    background: rgba(255,255,255,0.7);
  }
  .card.matched { opacity: 0.55; cursor: default; }
  .card .face { display: none; }
  .card.flipped .face, .card.matched .face { display: block; }
  .card:not(.flipped):not(.matched) .face { display: none; }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,27,42,0.55);
    color: #fff;
    text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 4rem); margin: 0; color: var(--accent); text-shadow: 0 4px 0 rgba(0,0,0,0.25); }
  .overlay p { font-size: clamp(0.9rem, 2.5vw, 1.2rem); margin: 0.4em 0; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="index.html">← Hub</a>
    <h1>MEMORY MATCH</h1>
    <span class="spacer"></span>
  </div>

  <div class="stats">
    <span>Moves: <span id="moves">0</span></span>
    <span>Pairs: <span id="pairs">0</span>/8</span>
  </div>

  <div class="grid" id="grid"></div>

  <div class="credit">Made by Atharv Tripathi</div>

  <div class="overlay hidden" id="win-screen">
    <h1>YOU WIN!</h1>
    <p id="final-moves">Moves: 0</p>
    <p id="best-moves">Best: -</p>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>

<script>
(() => {
  const gridEl = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const pairsEl = document.getElementById('pairs');
  const winScreen = document.getElementById('win-screen');
  const finalMovesEl = document.getElementById('final-moves');
  const bestMovesEl = document.getElementById('best-moves');
  const restartBtn = document.getElementById('restart-btn');
  const BEST_KEY = 'gamerhub_memory_best';

  const EMOJIS = ['🐶','🐱','🐵','🦊','🐸','🐧','🦁','🐻'];

  let cards, flipped, moves, matched, lock;

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function init() {
    const deck = shuffle([...EMOJIS, ...EMOJIS]);
    cards = deck.map((emoji, i) => ({ id: i, emoji, flipped: false, matched: false }));
    flipped = [];
    moves = 0;
    matched = 0;
    lock = false;
    movesEl.textContent = moves;
    pairsEl.textContent = matched;
    render();
  }

  function render() {
    gridEl.innerHTML = '';
    cards.forEach(card => {
      const el = document.createElement('div');
      el.className = 'card' + (card.flipped ? ' flipped' : '') + (card.matched ? ' matched' : '');
      const face = document.createElement('span');
      face.className = 'face';
      face.textContent = card.emoji;
      el.appendChild(face);
      el.addEventListener('click', () => onCardClick(card));
      gridEl.appendChild(el);
    });
  }

  function onCardClick(card) {
    if (lock || card.flipped || card.matched) return;
    card.flipped = true;
    flipped.push(card);
    render();

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;
      const [a, b] = flipped;
      if (a.emoji === b.emoji) {
        a.matched = b.matched = true;
        matched++;
        pairsEl.textContent = matched;
        flipped = [];
        render();
        if (matched === EMOJIS.length) {
          setTimeout(showWin, 300);
        }
      } else {
        lock = true;
        setTimeout(() => {
          a.flipped = b.flipped = false;
          flipped = [];
          lock = false;
          render();
        }, 700);
      }
    }
  }

  function showWin() {
    const best = parseInt(localStorage.getItem(BEST_KEY) || '0', 10);
    const newBest = best === 0 ? moves : Math.min(best, moves);
    localStorage.setItem(BEST_KEY, newBest);
    finalMovesEl.textContent = 'Moves: ' + moves;
    bestMovesEl.textContent = 'Best: ' + newBest;
    winScreen.classList.remove('hidden');
  }

  restartBtn.addEventListener('click', () => {
    winScreen.classList.add('hidden');
    init();
  });

  init();
})();
</script>
</body>
</html>
