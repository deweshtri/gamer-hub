<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Gamer Hub - Whack-a-Mole</title>
<link rel="stylesheet" href="style.css" />
<style>
  body { display: flex; flex-direction: column; min-height: 100vh; align-items: center; overflow: hidden; }
  .stats { display: flex; gap: 2em; font-size: clamp(1rem, 4vw, 1.5rem); font-weight: bold; margin: 0.4em 0 0.8em; }
  .field {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: min(90vw, 380px);
    margin: 0 auto;
  }
  .hole {
    position: relative;
    aspect-ratio: 1;
    background: #5a3a22;
    border-radius: 50%;
    box-shadow: inset 0 8px 14px rgba(0,0,0,0.5);
    overflow: hidden;
    cursor: pointer;
  }
  .mole {
    position: absolute;
    left: 10%;
    bottom: -100%;
    width: 80%;
    height: 80%;
    border-radius: 50% 50% 45% 45%;
    background: #8d6e63;
    transition: bottom 0.12s ease-out;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
  }
  .hole.up .mole { bottom: 5%; }
  .hole.whacked .mole { background: #c9c9c9; }

  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(13,27,42,0.55);
    color: #fff;
    text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay h1 { font-size: clamp(2rem, 7vw, 4rem); margin: 0; color: var(--accent); text-shadow: 0 4px 0 rgba(0,0,0,0.25); }
  .overlay p { font-size: clamp(0.9rem, 2.5vw, 1.2rem); margin: 0.4em 0; }
</style>
</head>
<body>
  <div class="topbar">
    <a class="back-link" href="index.html">← Hub</a>
    <h1>WHACK-A-MOLE</h1>
    <span class="spacer"></span>
  </div>

  <div class="stats">
    <span>Score: <span id="score">0</span></span>
    <span>Time: <span id="time">30</span>s</span>
  </div>

  <div class="field" id="field"></div>

  <div class="credit">Made by Atharv Tripathi</div>

  <div class="overlay" id="start-screen">
    <h1>WHACK-A-MOLE</h1>
    <p>Click the moles as fast as you can before they duck back down!</p>
    <p>You have 30 seconds.</p>
    <button class="btn" id="start-btn">Start Game</button>
  </div>

  <div class="overlay hidden" id="gameover-screen">
    <h1>TIME'S UP</h1>
    <p id="final-score">Score: 0</p>
    <p id="best-score">Best: 0</p>
    <button class="btn" id="restart-btn">Play Again</button>
  </div>

<script>
(() => {
  const field = document.getElementById('field');
  const scoreEl = document.getElementById('score');
  const timeEl = document.getElementById('time');
  const startScreen = document.getElementById('start-screen');
  const gameoverScreen = document.getElementById('gameover-screen');
  const startBtn = document.getElementById('start-btn');
  const restartBtn = document.getElementById('restart-btn');
  const finalScoreEl = document.getElementById('final-score');
  const bestScoreEl = document.getElementById('best-score');
  const BEST_KEY = 'gamerhub_mole_best';
  const HOLE_COUNT = 9;

  let holes = [];
  for (let i = 0; i < HOLE_COUNT; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    const mole = document.createElement('div');
    mole.className = 'mole';
    mole.textContent = '🐹';
    hole.appendChild(mole);
    field.appendChild(hole);
    holes.push(hole);
    hole.addEventListener('click', () => whack(hole));
  }

  let score, timeLeft, running, popTimer, countdownTimer, activeHole;

  function whack(hole) {
    if (!running) return;
    if (hole.classList.contains('up') && !hole.classList.contains('whacked')) {
      hole.classList.add('whacked');
      score++;
      scoreEl.textContent = score;
      setTimeout(() => hideHole(hole), 80);
    }
  }

  function hideHole(hole) {
    hole.classList.remove('up');
    hole.classList.remove('whacked');
    if (activeHole === hole) activeHole = null;
  }

  function popMole() {
    if (!running) return;
    if (activeHole) hideHole(activeHole);
    const hole = holes[Math.floor(Math.random() * holes.length)];
    activeHole = hole;
    hole.classList.add('up');
    const upTime = Math.max(450, 1000 - score * 15);
    setTimeout(() => { if (activeHole === hole) hideHole(hole); }, upTime);
    const nextDelay = Math.max(350, 800 - score * 10) + Math.random() * 400;
    popTimer = setTimeout(popMole, nextDelay);
  }

  function tick() {
    timeLeft--;
    timeEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      endGame();
    } else {
      countdownTimer = setTimeout(tick, 1000);
    }
  }

  function endGame() {
    running = false;
    clearTimeout(popTimer);
    clearTimeout(countdownTimer);
    holes.forEach(hideHole);
    const best = Math.max(score, parseInt(localStorage.getItem(BEST_KEY) || '0', 10));
    localStorage.setItem(BEST_KEY, best);
    finalScoreEl.textContent = 'Score: ' + score;
    bestScoreEl.textContent = 'Best: ' + best;
    gameoverScreen.classList.remove('hidden');
  }

  function startGame() {
    startScreen.classList.add('hidden');
    gameoverScreen.classList.add('hidden');
    score = 0;
    timeLeft = 30;
    activeHole = null;
    scoreEl.textContent = score;
    timeEl.textContent = timeLeft;
    running = true;
    popMole();
    countdownTimer = setTimeout(tick, 1000);
  }

  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);
})();
</script>
</body>
</html>
